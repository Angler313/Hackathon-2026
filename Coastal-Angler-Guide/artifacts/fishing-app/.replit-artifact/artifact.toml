kind = "web"
previewPath = "/"
title = "Hyper-Local Fishing Companion"
version = "1.0.0"
id = "artifacts/fishing-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19506

[services.development]
run = "pnpm --filter @workspace/fishing-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fishing-app", "run", "build" ]
publicDir = "artifacts/fishing-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19506"
BASE_PATH = "/"
